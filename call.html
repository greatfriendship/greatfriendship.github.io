<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOX | Private Audio</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #ffffff; --surface: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: var(--bg); color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; border: 5px solid #111; }
        
        .app-container { width: 100%; max-width: 350px; background: var(--surface); padding: 30px; border: 1px solid #333; }
        h1 { font-size: 1rem; letter-spacing: 5px; margin-bottom: 25px; text-align: center; color: var(--accent); }
        
        input { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: #0f0; margin-bottom: 10px; outline: none; text-align: center; }
        input:focus { border-color: var(--accent); }
        
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        button:hover { opacity: 0.8; }
        button.sec { background: transparent; color: #666; border: 1px solid #333; font-size: 0.7rem; }

        .status-box { margin-top: 20px; padding: 10px; border-top: 1px solid #222; font-size: 0.8rem; text-align: center; }
        .blink { animation: blinker 1.5s linear infinite; color: #0f0; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        #room-ui { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>VOX_SYSTEM</h1>

        <div id="setup-ui">
            <input type="text" id="room-id" placeholder="ID DA SALA (ex: bryan123)">
            <button onclick="conectar('host')">CRIAR SALA (HOST)</button>
            <button onclick="conectar('guest')">ENTRAR NA SALA</button>
            <div class="status-box" id="setup-status">Aguardando comando...</div>
        </div>

        <div id="room-ui">
            <div id="room-name" style="color: #666; margin-bottom: 20px;">SALA: ---</div>
            <div class="blink" id="call-status">CONECTANDO...</div>
            <button class="sec" onclick="location.reload()" style="margin-top: 30px;">ENCERRAR</button>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        let peer = null;
        let localStream = null;

        async function conectar(modo) {
            const sala = document.getElementById('room-id').value;
            if (!sala) return alert("Digite o ID da sala");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('room-ui').style.display = 'block';
                document.getElementById('room-name').innerText = "SALA: " + sala.toUpperCase();

                if (modo === 'host') {
                    // O HOST usa o nome da sala como seu próprio ID
                    peer = new Peer(sala);
                    
                    peer.on('open', () => {
                        document.getElementById('call-status').innerText = "AGUARDANDO CONVIDADO...";
                    });

                    peer.on('call', (call) => {
                        call.answer(localStream);
                        vincularStream(call);
                    });

                } else {
                    // O GUEST usa um ID aleatório e liga para o nome da sala
                    peer = new Peer();
                    
                    peer.on('open', () => {
                        document.getElementById('call-status').innerText = "LIGANDO PARA O HOST...";
                        const call = peer.call(sala, localStream);
                        vincularStream(call);
                    });
                }

                peer.on('error', (err) => {
                    alert("Erro: Este ID de sala já está ocupado por um HOST.");
                    location.reload();
                });

            } catch (e) {
                alert("Erro ao acessar microfone. Use HTTPS.");
            }
        }

        function vincularStream(call) {
            call.on('stream', (remoteStream) => {
                const audio = document.getElementById('remote-audio');
                audio.srcObject = remoteStream;
                document.getElementById('call-status').innerText = "SISTEMA ONLINE - EM CHAMADA";
                document.getElementById('call-status').classList.remove('blink');
            });
        }
    </script>
</body>
</html>
