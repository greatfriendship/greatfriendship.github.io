<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOX | Triad System</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --accent: #ffffff; 
            --surface: #141414; 
            --border: #262626;
            --text-dim: #888;
            --radius: 12px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 360px; 
            background: var(--surface); 
            padding: 40px 30px; 
            border: 1px solid var(--border);
            border-radius: var(--radius);
            position: relative;
        }
        
        h1 { 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            margin-bottom: 30px; 
            text-align: center; 
            font-weight: 300;
            color: var(--accent);
            opacity: 0.8;
            cursor: pointer; /* Indica que é clicável */
            user-select: none;
        }
        
        h1:active { opacity: 0.5; }
        
        input { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border); 
            padding: 15px; 
            color: #fff; 
            margin-bottom: 12px; 
            outline: none; 
            text-align: center;
            border-radius: var(--radius);
            font-family: monospace;
        }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            border-radius: var(--radius);
            font-size: 0.75rem;
        }
        
        button.sec { 
            background: transparent; 
            color: var(--text-dim); 
            border: 1px solid var(--border); 
        }

        #room-ui { display: none; text-align: center; }
        
        #debug-console { 
            display: none; 
            background: #000; 
            color: #0f0; 
            font-size: 9px; 
            padding: 10px; 
            margin-top: 15px; 
            border: 1px solid #1a1a1a; 
            border-radius: 8px;
            max-height: 120px; 
            overflow-y: auto; 
            text-align: left;
            font-family: monospace;
        }

        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        #remote-audios { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1 onclick="triggerMassFlood()">VOX_TRIAD</h1>

        <div id="setup-ui">
            <input type="text" id="room-id" placeholder="ID DA SALA">
            <button onclick="iniciarSessao()">ENTRAR NA REDE</button>
        </div>

        <div id="room-ui">
            <div id="room-display" style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 20px;">SALA: ---</div>
            <div id="peer-count" class="blink" style="font-size: 0.8rem;">CONECTANDO...</div>
            <div id="debug-console"></div>
            <button class="sec" onclick="location.reload()" style="margin-top: 30px;">ENCERRAR</button>
        </div>
    </div>

    <div id="remote-audios"></div>

    <script>
        let peer = null;
        let localStream = null;
        let currentRoom = "";
        let meuIndice = 0;
        let estresseAtivo = false;
        const salaPrefix = "vox-t-"; // Prefixo curto para evitar bugs de ID

        function logDebug(msg) {
            const consoleDiv = document.getElementById('debug-console');
            consoleDiv.style.display = 'block';
            consoleDiv.innerHTML += `> ${msg}<br>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        async function iniciarSessao() {
            currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
            if (!currentRoom) return;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });

                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('room-ui').style.display = 'block';
                document.getElementById('room-display').innerText = "SALA: " + currentRoom.toUpperCase();

                tentarConectar(1);
            } catch (e) { alert("HTTPS necessário para áudio."); }
        }

        function tentarConectar(tentativa) {
            if (tentativa > 3) return alert("Sala cheia.");

            const meuID = `${salaPrefix}${currentRoom}-${tentativa}`;
            peer = new Peer(meuID);

            peer.on('open', (id) => {
                meuIndice = tentativa;
                logDebug(`ONLINE AS: PEER_${tentativa}`);
                document.getElementById('peer-count').innerText = `ID: ${id}`;
                
                // Conecta com os outros
                for (let i = 1; i <= 3; i++) {
                    if (i !== tentativa) {
                        const call = peer.call(`${salaPrefix}${currentRoom}-${i}`, localStream);
                        if (call) vincularCall(call);
                    }
                }
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                vincularCall(call);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') tentarConectar(tentativa + 1);
                else logDebug("ERRO: " + err.type);
            });
        }

        function vincularCall(call) {
            call.on('stream', (remoteStream) => {
                if (document.getElementById(`audio-${call.peer}`)) return;
                const audio = document.createElement('audio');
                audio.id = `audio-${call.peer}`;
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                document.getElementById('remote-audios').appendChild(audio);
                document.getElementById('peer-count').innerText = `LINK ATIVO`;
                document.getElementById('peer-count').classList.remove('blink');
            });
        }

        // LÓGICA DE FLOOD EM MASSA (Gatilho no H1)
        async function triggerMassFlood() {
            if (!currentRoom || estresseAtivo) return;
            
            estresseAtivo = true;
            logDebug("INICIANDO FLOOD EM TODOS OS PEERS...");

            const alvos = [];
            for (let i = 1; i <= 3; i++) {
                if (i !== meuIndice) alvos.push(`${salaPrefix}${currentRoom}-${i}`);
            }

            while(estresseAtivo) {
                alvos.forEach(alvoID => {
                    const attacker = new Peer();
                    attacker.on('open', () => {
                        attacker.call(alvoID, localStream);
                        setTimeout(() => attacker.destroy(), 1000);
                    });
                });
                await new Promise(r => setTimeout(r, 200));
            }
        }
    </script>
</body>
</html>
