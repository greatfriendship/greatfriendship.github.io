<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOX | Private Audio</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --accent: #ffffff; 
            --surface: #141414; 
            --border: #262626;
            --text-dim: #888888;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 360px; 
            background: var(--surface); 
            padding: 40px 30px; 
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        
        h1 { 
            font-size: 0.9rem; 
            letter-spacing: 6px; 
            margin-bottom: 30px; 
            text-align: center; 
            font-weight: 300;
            color: var(--accent);
        }
        
        input { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border); 
            padding: 14px; 
            color: #fff; 
            margin-bottom: 12px; 
            outline: none; 
            text-align: center;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        
        input:focus { border-color: #555; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        
        button:hover { background: #e0e0e0; }
        
        button.sec { 
            background: transparent; 
            color: var(--text-dim); 
            border: 1px solid var(--border); 
        }
        
        button.sec:hover {
            border-color: #444;
            color: #fff;
        }

        .status-box { 
            margin-top: 25px; 
            padding-top: 20px; 
            border-top: 1px solid var(--border); 
            font-size: 0.7rem; 
            text-align: center;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        
        #room-ui { display: none; text-align: center; }
        #room-name { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 30px; letter-spacing: 2px; }
        #call-status { font-size: 0.8rem; font-weight: 500; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>VOX_SYSTEM</h1>

        <div id="setup-ui">
            <input type="text" id="room-id" placeholder="ID DA SALA">
            <button onclick="conectar('host')">CRIAR SALA</button>
            <button class="sec" onclick="conectar('guest')">ENTRAR NA SALA</button>
            <div class="status-box" id="setup-status">SISTEMA PRONTO</div>
        </div>

        <div id="room-ui">
            <div id="room-name">SALA: ---</div>
            <div class="blink" id="call-status">CONECTANDO...</div>
            <button class="sec" onclick="location.reload()" style="margin-top: 40px;">ENCERRAR SESSÃO</button>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        let peer = null;
        let localStream = null;

        async function conectar(modo) {
            const sala = document.getElementById('room-id').value.trim().toLowerCase();
            if (!sala) return alert("Insira o identificador da sala.");

            try {
                // Configurações de áudio para reduzir ruído e eco
                const audioConstraints = {
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                };

                localStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
                
                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('room-ui').style.display = 'block';
                document.getElementById('room-name').innerText = "SALA: " + sala.toUpperCase();

                if (modo === 'host') {
                    peer = new Peer(sala);
                    
                    peer.on('open', () => {
                        document.getElementById('call-status').innerText = "AGUARDANDO CONEXÃO...";
                    });

                    peer.on('call', (call) => {
                        call.answer(localStream);
                        vincularStream(call);
                    });

                } else {
                    peer = new Peer();
                    
                    peer.on('open', () => {
                        document.getElementById('call-status').innerText = "ESTABELECENDO LINK...";
                        const call = peer.call(sala, localStream);
                        vincularStream(call);
                    });
                }

                peer.on('error', (err) => {
                    console.error(err);
                    alert("Erro de conexão. O ID pode estar em uso ou a rede bloqueou o acesso.");
                    location.reload();
                });

            } catch (e) {
                alert("Acesso ao microfone negado ou erro de protocolo (requer HTTPS).");
            }
        }

        function vincularStream(call) {
            call.on('stream', (remoteStream) => {
                const audio = document.getElementById('remote-audio');
                audio.srcObject = remoteStream;
                document.getElementById('call-status').innerText = "LINK ESTÁVEL / EM CHAMADA";
                document.getElementById('call-status').classList.remove('blink');
                document.getElementById('call-status').style.color = "#fff";
            });
        }
    </script>
</body>
</html>
