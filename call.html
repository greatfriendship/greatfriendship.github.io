<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOX | Triad</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #ffffff; --surface: #111; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: var(--bg); color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .app-container { width: 100%; max-width: 350px; background: var(--surface); padding: 30px; border: 1px solid var(--border); position: relative; }
        h1 { font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 25px; text-align: center; color: var(--accent); opacity: 0.7; }
        
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; color: #fff; margin-bottom: 10px; outline: none; text-align: center; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; font-size: 0.7rem; }
        
        .status-box { margin-top: 20px; font-size: 0.7rem; text-align: center; color: #555; }
        #room-ui { display: none; }
        
        /* O Botão Escondido */
        .hidden-trigger { position: absolute; bottom: 5px; right: 5px; color: #151515; cursor: default; font-size: 10px; user-select: none; }
        .hidden-trigger:hover { color: #333; }
        
        #debug-console { display: none; background: #000; color: #0f0; font-size: 10px; padding: 10px; margin-top: 10px; border: 1px solid #1a1a1a; max-height: 100px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>VOX_MULTI_PEER</h1>

        <div id="setup-ui">
            <input type="text" id="room-id" placeholder="IDENTIFICADOR DA SALA">
            <button onclick="iniciarSessao()">ENTRAR NA REDE</button>
        </div>

        <div id="room-ui">
            <div id="room-display" style="font-size: 0.7rem; color: #555; margin-bottom: 20px;">SALA: ---</div>
            <div id="peer-count">Conectados: 1/3</div>
            <div id="debug-console"></div>
            <button onclick="location.reload()" style="margin-top: 30px; background: transparent; color: #444; border: 1px solid #222;">LOGOUT</button>
        </div>

        <div class="hidden-trigger" onclick="toggleDebug()">.</div>
    </div>

    <div id="remote-audios"></div>

    <script>
        let peer = null;
        let localStream = null;
        let conexoes = 0;
        const salaPrefix = "vox-room-";

        function logDebug(msg) {
            const consoleDiv = document.getElementById('debug-console');
            consoleDiv.innerHTML += `> ${msg}<br>`;
            console.log(msg);
        }

        function toggleDebug() {
            const dc = document.getElementById('debug-console');
            dc.style.display = dc.style.display === 'none' ? 'block' : 'none';
        }

        async function iniciarSessao() {
            const salaNome = document.getElementById('room-id').value.trim().toLowerCase();
            if (!salaNome) return;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });

                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('room-ui').style.display = 'block';
                document.getElementById('room-display').innerText = "SALA: " + salaNome.toUpperCase();

                // Para permitir 3 pessoas, cada uma entra com um sufixo (ex: sala-1, sala-2, sala-3)
                // Vamos tentar ocupar uma vaga disponível na "sala"
                tentarConectar(salaNome, 1);

            } catch (e) { alert("Erro de Permissão."); }
        }

        function tentarConectar(nome, tentativa) {
            if (tentativa > 3) return alert("Sala cheia.");

            const meuID = `${salaPrefix}${nome}-${tentativa}`;
            peer = new Peer(meuID);

            peer.on('open', (id) => {
                logDebug(`Local ID: ${id}`);
                logDebug(`IP Local Estimado via WebRTC ativo.`);
                
                // Tenta ligar para as outras vagas da sala
                for (let i = 1; i <= 3; i++) {
                    if (i !== tentativa) {
                        const peerDestino = `${salaPrefix}${nome}-${i}`;
                        const call = peer.call(peerDestino, localStream);
                        if (call) vincularCall(call);
                    }
                }
            });

            peer.on('call', (call) => {
                logDebug(`Chamada recebida de: ${call.peer}`);
                call.answer(localStream);
                vincularCall(call);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    tentarConectar(nome, tentativa + 1);
                } else {
                    logDebug(`Erro: ${err.type}`);
                }
            });
        }

        function vincularCall(call) {
            call.on('stream', (remoteStream) => {
                // Evita duplicar áudio se a conexão já existir
                if (document.getElementById(`audio-${call.peer}`)) return;

                const audio = document.createElement('audio');
                audio.id = `audio-${call.peer}`;
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                document.getElementById('remote-audios').appendChild(audio);
                
                conexoes++;
                document.getElementById('peer-count').innerText = `Conectados: ${conexoes + 1}/3`;
                
                // Puxar metadados do Peer (o "puxar mais dado")
                const connInfo = call.peerConnection.getRemoteStreams()[0];
                logDebug(`Stream Ativa de: ${call.peer}`);
                logDebug(`Codec: OPUS/48000`);
            });
        }
    </script>
</body>
</html>
